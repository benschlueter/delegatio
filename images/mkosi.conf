[Distribution]
Distribution=arch

[Output]
Format=disk
Bootable=yes
Qcow2=yes
Output=disk.qcow2
WorkspaceDirectory=/tmp
KernelCommandLine=console=ttyS0,38400n8d


[Packages]
Packages=
         openssh
         vim
         curl
         linux
         python
         
         socat
         ethtool
         conntrack-tools
         iptables-nft
         runc
         cri-o

         nfs-utils

[Validation]
Password=password

[Content]
Cache=.cache
Autologin=yes

[Host]
QemuHeadless=yes
